<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATAVA FestHub - Judges Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { 
            background: #f8fafc; /* CLEAN WHITE/LIGHT BG */
            color: #0f172a; 
            padding: 15px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .judge-container {
            max-width: 500px;
            width: 100%;
            margin: auto;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            padding: 20px;
            border: 1px solid #e2e8f0;
        }

        /* Header Area */
        .judge-header {
            text-align: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }
        .judge-header h1 {
            font-size: 1.5rem;
            color: #0284c7;
            font-weight: 900;
        }
        .judge-header p {
            font-size: 0.9rem;
            color: #64748b;
            font-weight: 700;
            margin-top: 2px;
        }

        /* Dynamic Event Info Badge */
        .event-badge {
            background: #e0f2fe;
            color: #0369a1;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 20px;
            border: 1px solid #bae6fd;
        }

        /* Participant Selector */
        .selector-group {
            margin-bottom: 20px;
        }
        .selector-group label {
            display: block;
            font-size: 0.9rem;
            font-weight: 800;
            color: #334155;
            margin-bottom: 8px;
        }
        .large-select {
            width: 100%;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            background-color: #fff;
            color: #0f172a;
        }
        .large-select:focus {
            border-color: #0284c7;
            outline: none;
        }

        /* Scoring Criteria Block */
        .criteria-card {
            background: #f1f5f9;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .criteria-title {
            font-size: 1rem;
            font-weight: 800;
            color: #475569;
            margin-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 5px;
        }
        .input-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .input-row label {
            font-size: 0.95rem;
            font-weight: 700;
            color: #1e293b;
        }
        .score-box {
            width: 80px;
            padding: 10px;
            font-size: 1.2rem;
            font-weight: 800;
            text-align: center;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
        }
        .score-box:focus {
            border-color: #10b981;
            outline: none;
        }

        /* Total Score Display */
        .total-display {
            background: #d1e7dd;
            color: #0f5132;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Submit Button */
        .btn-submit {
            width: 100%;
            background: #10b981;
            color: white;
            border: none;
            padding: 14px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(16, 185, 129, 0.2);
            transition: 0.2s;
        }
        .btn-submit:hover {
            background: #059669;
        }

        footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.75rem;
            color: #94a3b8;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="judge-container">
        <!-- Header -->
        <div class="judge-header">
            <h1>ATAVA FestHub</h1>
            <p>Official Judging Portal (മൊബൈൽ പാനൽ)</p>
        </div>

        <!-- Event Name -->
        <div class="event-badge" id="lblEvent">
            <i class="fa-solid fa-microphone-lines"></i> MADH SONG (മദ്ഹ് ഗാനം)
        </div>

        <!-- Select Chest Number -->
        <div class="selector-group">
            <label><i class="fa-solid fa-user-check"></i> മത്സരാർത്ഥിയെ തിരഞ്ഞെടുക്കുക</label>
            <select id="chestSelect" class="large-select" onchange="loadStudentName()">
                <option value="">-- select chest number --</option>
                <option value="101">101 - Muhammed Faisal</option>
                <option value="104">104 - Muhammed Shamil K.</option>
                <option value="105">105 - Ahmed Yasir</option>
                <option value="112">112 - Fathima Riya</option>
            </select>
        </div>

        <!-- Detailed Scoring Form -->
        <div class="criteria-card">
            <div class="criteria-title"><i class="fa-solid fa-star"></i> മാർക്കുകൾ നൽകുക (Max 100)</div>
            
            <!-- Criteria 1 -->
            <div class="input-row">
                <label>1. അവതരണം / ആലാപനം (Presentation - 40)</label>
                <input type="number" id="c1" class="score-box" min="0" max="40" placeholder="0" oninput="calculateTotal()">
            </div>

            <!-- Criteria 2 -->
            <div class="input-row">
                <label>2. ഉച്ചാരണം / സാഹിത്യം (Pronunciation - 30)</label>
                <input type="number" id="c2" class="score-box" min="0" max="30" placeholder="0" oninput="calculateTotal()">
            </div>

            <!-- Criteria 3 -->
            <div class="input-row">
                <label>3. ശബ്ദം / രാഗം (Melody & Tone - 30)</label>
                <input type="number" id="c3" class="score-box" min="0" max="30" placeholder="0" oninput="calculateTotal()">
            </div>
        </div>

        <!-- Total View -->
        <div class="total-display">
            <span>ആകെ മാർക്ക് (TOTAL):</span>
            <span id="totalScore">0 / 100</span>
        </div>

        <!-- Submit -->
        <button class="btn-submit" onclick="submitJudgeScore()">
            <i class="fa-solid fa-paper-plane"></i> മാർക്ക് സമർപ്പിക്കുക (Submit)
        </button>

        <footer>
            POWERED BY ATAVA DIGITAL SERVICES
        </footer>
    </div>

    <script>
        // Extract Event from URL query string if available
        const urlParams = new URLSearchParams(window.location.search);
        const eventParam = urlParams.get('event');
        if (eventParam) {
            document.getElementById('lblEvent').innerHTML = `<i class="fa-solid fa-microphone-lines"></i> ${decodeURIComponent(eventParam).toUpperCase()}`;
        }

        function calculateTotal() {
            const c1 = parseFloat(document.getElementById('c1').value) || 0;
            const c2 = parseFloat(document.getElementById('c2').value) || 0;
            const c3 = parseFloat(document.getElementById('c3').value) || 0;

            // Simple validation limit check
            if(c1 > 40) { alert('പരമാവധി മാർക്ക് 40 ആണ്!'); document.getElementById('c1').value = 40; return; }
            if(c2 > 30) { alert('പരമാവധി മാർക്ക് 30 ആണ്!'); document.getElementById('c2').value = 30; return; }
            if(c3 > 30) { alert('പരമാവധി മാർക്ക് 30 ആണ്!'); document.getElementById('c3').value = 30; return; }

            const total = c1 + c2 + c3;
            document.getElementById('totalScore').innerText = total + " / 100";
        }

        function submitJudgeScore() {
            const chest = document.getElementById('chestSelect').value;
            const total = document.getElementById('totalScore').innerText.split(' ')[0];

            if(!chest) {
                alert('ദയവായി ചെസ്റ്റ് നമ്പർ തിരഞ്ഞെടുക്കുക!');
                return;
            }

            if(total == 0) {
                if(!confirm('മാർക്ക് ഒന്നും നൽകാതെ സബ്മിറ്റ് ചെയ്യണോ?')) return;
            }

            alert(`Chest No: ${chest}-ന്റെ മാർക്ക് വിജയകരമായി റെക്കോർഡ് ചെയ്തു!`);
            
            // Clear fields for next entry
            document.getElementById('c1').value = '';
            document.getElementById('c2').value = '';
            document.getElementById('c3').value = '';
            document.getElementById('chestSelect').value = '';
            document.getElementById('totalScore').innerText = "0 / 100";
        }

        function loadStudentName() {
            // Future linking to dynamically fetch localstorage user data if shared
        }
    </script>
</body>
</html>
